<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Quicksand','Calibri',cursive;
  background:linear-gradient(135deg,#f5e6d3,#e8d3b9);
  color:#3b2c20;
  overflow:hidden;

  /* ✅ FIX: remove flex + fix viewport */
  height:100dvh;
}

/* ✅ PERFECT CENTER FIX */
section{
  height:100dvh;
  min-height:100dvh;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;

  padding:20px;
  box-sizing:border-box;
}

.fancy{
  font-family:'Playfair Display',serif;
  font-size:34px;
  font-weight:500;
  color:#2b1e14;
  line-height:1.9;
  opacity:0;
  animation:fadeIn 2s ease forwards;
}

@keyframes fadeIn{
  to{opacity:1;}
}

.heart{
  position:absolute;
  color:#d94f70;
  font-size:14px;
  top:-20px;
  animation:fall 5s linear infinite;
  opacity:0.7;
}

@keyframes fall{
  from{transform:translateY(0);}
  to{transform:translateY(110vh);}
}

button{
  margin-top:20px;
  padding:12px 28px;
  border-radius:25px;
  border:none;
  background:#6d4c41;
  color:white;
}

img{
  max-width:80%;
  border-radius:15px;
  margin-top:10px;
}

.type{
  font-family:'Playfair Display',serif;
  font-size:32px;
  white-space:pre-line;
}

</style>
</head>

<body>

<!-- EVERYTHING BELOW IS YOUR ORIGINAL CODE (UNCHANGED) -->

<section>
  <h2 id="tap">Tap to start 💖</h2>
  <h1 id="introText"></h1>
  <audio id="intro" src="intro.mp3" preload="auto"></audio>
</section>

<section>
  <h2 id="msgText"></h2>
  <button id="btn" onclick="showPhoto()" style="display:none;">Chaloooooo 💕</button>
  <audio id="msgAudio" src="message.mp3" preload="auto"></audio>
</section>

<section id="photo" style="display:none;">
  <img src="photo.jpg">
  <audio id="bgmusic" src="bgmusic.mp3" preload="auto"></audio>
</section>

<section id="afterPhoto" style="display:none;">
  <h2 id="afterText"></h2>
  <button id="instaBtn" onclick="showInsta()" style="display:none;">
    Well, wanna know how it started? 💫
  </button>
</section>

<section id="insta" style="display:none;">
  <img src="insta.jpg">
  <audio id="instaAudio" src="insta.mp3" preload="auto"></audio>
</section>

<section id="instaBtn2Sec" style="display:none;">
  <button onclick="showFB()">THIS IS HOW IT STARTED MAYBE? 😂</button>
</section>

<section id="fb" style="display:none;">
  <img src="fb.jpg">
  <audio id="fbAudio" src="fbmusic.mp3" preload="auto"></audio>
</section>

<section id="typingSec" style="display:none;">
  <h2 id="typingText" class="fancy type"></h2>
</section>

<section id="sticker1" style="display:none;">
  <h2>My expectations 😌</h2>
  <img src="sticker1.png">
</section>

<section id="sticker2" style="display:none;">
  <h2>But reality 😂</h2>
  <img src="sticker2.png">
  <audio id="s2music" src="s2music.mp3" preload="auto"></audio>
  <button onclick="showFinal()">Tap Me 💕</button>
</section>

<section id="final" style="display:none;">
  <h2 class="fancy">
    Happy 27th Birthday 🩷<br>
    ab hua na barabri ka competition 😎
  </h2>
</section>

<!-- YOUR SCRIPT (UNCHANGED) -->
<script>
/* KEEP YOUR ORIGINAL JS EXACTLY SAME */
</script>

</body>
</html>
