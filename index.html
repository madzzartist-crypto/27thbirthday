<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Quicksand','Calibri',cursive;
  background:linear-gradient(135deg,#f5e6d3,#e8d3b9);
  color:#3b2c20;
  overflow:hidden;
}

section{
  height:100vh;
  height:calc(var(--vh, 1vh) * 100);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.fancy{
  font-family:'Playfair Display',serif;
  font-size:34px;
  font-weight:500;
  color:#2b1e14;
  line-height:1.9;
  opacity:0;
  animation:fadeIn 2s ease forwards;
}

@keyframes fadeIn{
  to{opacity:1;}
}

.heart{
  position:absolute;
  color:#d94f70;
  font-size:14px;
  top:-20px;
  animation:fall 5s linear infinite;
  opacity:0.7;
}

@keyframes fall{
  from{transform:translateY(0);}
  to{transform:translateY(110vh);}
}

button{
  margin-top:20px;
  padding:12px 28px;
  border-radius:25px;
  border:none;
  background:#6d4c41;
  color:white;
}

img{
  max-width:80%;
  border-radius:15px;
  margin-top:10px;
}

.type{
  font-family:'Playfair Display',serif;
  font-size:32px;
  white-space:pre-line;
}

</style>
</head>

<body>

<section>
  <h2 id="tap">Tap to start 💖</h2>
  <h1 id="introText"></h1>
  <audio id="intro" src="intro.mp3" preload="auto"></audio>
</section>

<section>
  <h2 id="msgText"></h2>
  <button id="btn" onclick="showPhoto()" style="display:none;">Chaloooooo 💕</button>
  <audio id="msgAudio" src="message.mp3" preload="auto"></audio>
</section>

<section id="photo" style="display:none;">
  <img src="photo.jpg">
  <audio id="bgmusic" src="bgmusic.mp3" preload="auto"></audio>
</section>

<section id="afterPhoto" style="display:none;">
  <h2 id="afterText"></h2>
  <button id="instaBtn" onclick="showInsta()" style="display:none;">
    Well, wanna know how it started? 💫
  </button>
</section>

<section id="insta" style="display:none;">
  <img src="insta.jpg">
  <audio id="instaAudio" src="insta.mp3" preload="auto"></audio>
</section>

<section id="instaBtn2Sec" style="display:none;">
  <button onclick="showFB()">THIS IS HOW IT STARTED MAYBE? 😂</button>
</section>

<section id="fb" style="display:none;">
  <img src="fb.jpg">
  <audio id="fbAudio" src="fbmusic.mp3" preload="auto"></audio>
</section>

<section id="typingSec" style="display:none;">
  <h2 id="typingText" class="fancy type"></h2>
</section>

<section id="sticker1" style="display:none;">
  <h2>My expectations 😌</h2>
  <img src="sticker1.png">
</section>

<section id="sticker2" style="display:none;">
  <h2>But reality 😂</h2>
  <img src="sticker2.png">
  <audio id="s2music" src="s2music.mp3" preload="auto"></audio>
  <button onclick="showFinal()">Tap Me 💕</button>
</section>

<section id="final" style="display:none;">
  <h2 class="fancy">
    Happy 27th Birthday 🩷<br>
    ab hua na barabri ka competition 😎
  </h2>
</section>

<script>

// viewport height fix (ONLY addition)
let vh = window.innerHeight * 0.01;
document.documentElement.style.setProperty('--vh', `${vh}px`);

let started=false;

function play(a){
  a.currentTime=0;
  a.play().catch(()=>{});
}

function showText(el,text){
  el.innerHTML=text;
}

function typeText(el,text,speed=120){
  let i=0;
  el.innerHTML="";
  let interval=setInterval(()=>{
    el.innerHTML += text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(interval);
  },speed);
}

function createHearts(){
  for(let i=0;i<30;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"%";
    h.style.animationDuration=(4+Math.random()*3)+"s";
    document.body.appendChild(h);
  }
}

document.body.onclick=()=>{
if(started) return;
started=true;

document.getElementById("tap").style.display="none";

let intro=document.getElementById("intro");
let msgAudio=document.getElementById("msgAudio");
let s2=document.getElementById("s2music");

// ✅ FIXED AUDIO UNLOCK (FOR GITHUB)
[
  msgAudio,
  document.getElementById("bgmusic"),
  document.getElementById("instaAudio"),
  document.getElementById("fbAudio"),
  document.getElementById("s2music")
].forEach(a=>{
  if(a){
    a.muted = true;
    a.play().then(()=>{
      a.pause();
      a.currentTime = 0;
      a.muted = false;
    }).catch(()=>{});
  }
});

// 🎧 INTRO (unchanged)
play(intro);

let text=document.getElementById("introText");

setTimeout(()=>showText(text,"hihihi… aaj kisi ka birthday hai? 😄"),1500);
setTimeout(()=>showText(text,"mhmmm… birthday??? 🤭"),5500);
setTimeout(()=>showText(text,"mhmmm… kiskaaaa??? 😏"),8500);
setTimeout(()=>showText(text,"mhmmm… Sonu kaa!!! 😌💖"),11500);

setTimeout(()=>{
window.scrollBy({top:innerHeight,behavior:"smooth"});
setTimeout(startMessage,2000);
},13500);
};

function startMessage(){

let audio=document.getElementById("msgAudio");
let text=document.getElementById("msgText");
let btn=document.getElementById("btn");

play(audio);

setTimeout(()=>showText(text,"I know ye thoda filmy hai… 💫"),0);
setTimeout(()=>showText(text,"But aap bhi toh Shahid Kapoor ho 😌"),4000);
setTimeout(()=>showText(text,"Anyway, jokes apart 😄"),7500);
setTimeout(()=>showText(text,"Ummm this is just me trying to show you how I see you 💖"),10500);

setTimeout(()=>btn.style.display="block",14000);
}

function showPhoto(){

document.getElementById("msgAudio").pause();

let sec=document.getElementById("photo");
let bg=document.getElementById("bgmusic");

sec.style.display="flex";
window.scrollBy({top:innerHeight,behavior:"smooth"});

play(bg);

setTimeout(()=>{
bg.pause();
showAfterPhoto();
},36000);
}

function showAfterPhoto(){

let sec=document.getElementById("afterPhoto");
let text=document.getElementById("afterText");
let btn=document.getElementById("instaBtn");

sec.style.display="flex";
window.scrollBy({top:innerHeight,behavior:"smooth"});

showText(text,"That's too much of taarif 😂<br>You don't deserve 😏");

setTimeout(()=>btn.style.display="block",2500);
}

function showInsta(){

let sec=document.getElementById("insta");
let audio=document.getElementById("instaAudio");

sec.style.display="flex";
window.scrollBy({top:innerHeight,behavior:"smooth"});

play(audio);

setTimeout(()=>{
audio.pause();
document.getElementById("instaBtn2Sec").style.display="flex";
window.scrollBy({top:innerHeight,behavior:"smooth"});
},8000);
}

function showFB(){

let sec=document.getElementById("fb");
let audio=document.getElementById("fbAudio");

sec.style.display="flex";
window.scrollBy({top:innerHeight,behavior:"smooth"});

play(audio);

setTimeout(()=>{
audio.pause();
showTyping();
},5000);
}

function showTyping(){

let sec=document.getElementById("typingSec");
let text=document.getElementById("typingText");

sec.style.display="flex";
window.scrollBy({top:innerHeight,behavior:"smooth"});

typeText(text,
"I don't know how you like to be celebrated yet\n\nSo\n\nI made this for you 🩷\n\nI hope you liked it ☺️"
);

createHearts();

setTimeout(showStickers,13000);
}

function showStickers(){

let s1=document.getElementById("sticker1");
s1.style.display="flex";

window.scrollBy({top:innerHeight,behavior:"smooth"});

setTimeout(()=>{
let s2=document.getElementById("sticker2");
s2.style.display="flex";

let music=document.getElementById("s2music");
play(music);

window.scrollBy({top:innerHeight,behavior:"smooth"});
},4000);
}

function showFinal(){

let final=document.getElementById("final");

final.style.display="flex";
createHearts();

window.scrollTo({
  top:final.offsetTop,
  behavior:"smooth"
});
}

</script>
</body>
</html>
